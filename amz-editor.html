<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixelink-US 亚马逊高阶排版工具 V2.0</title>
    <style>
        :root { --amz-navy: #232f3e; --amz-orange: #febd69; --dark-bg: #1e1e1e; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; display: flex; height: 100vh; background: #f0f2f2; overflow: hidden; }
        
        /* 左侧编辑区 */
        #left { width: 50%; display: flex; flex-direction: column; border-right: 2px solid #ddd; box-shadow: 2px 0 5px rgba(0,0,0,0.1); }
        .toolbar { background: var(--amz-navy); padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; border-bottom: 1px solid #444; }
        
        /* 按钮样式 */
        .btn { background: #3a4553; color: white; border: 1px solid #555; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-size: 13px; transition: 0.2s; }
        .btn:hover { background: #4a5a6a; border-color: var(--amz-orange); }
        .btn-orange { background: var(--amz-orange); color: #111; font-weight: bold; border: none; }
        .btn-orange:hover { background: #f3a847; }
        
        textarea { flex-grow: 1; padding: 20px; font-family: 'Fira Code', 'Courier New', monospace; font-size: 15px; border: none; outline: none; background: var(--dark-bg); color: #d4d4d4; line-height: 1.6; resize: none; }

        /* 右侧预览区 */
        #right { width: 50%; background: white; display: flex; flex-direction: column; }
        .preview-header { background: #eaeded; padding: 10px 20px; font-size: 12px; font-weight: bold; color: #565959; text-transform: uppercase; border-bottom: 1px solid #ddd; }
        #output { padding: 40px; overflow-y: auto; color: #111; line-height: 1.5; font-size: 14px; }
        
        /* 模拟亚马逊样式 */
        #output b, #output strong { color: #111; }
        #output ul { padding-left: 20px; margin: 10px 0; }
        #output li { margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="left">
        <div class="toolbar">
            <button class="btn" onclick="wrapText('<b>', '</b>')">加粗 <b>B</b></button>
            <button class="btn" onclick="wrapText('<i>', '</i>')">斜体 <i>I</i></button>
            <button class="btn" onclick="insertText('<br>\n')">换行 &lt;br&gt;</button>
            <button class="btn" onclick="insertList()">加入列表 ● List</button>
            <button class="btn" onclick="wrapText('【', '】')">卖点括号 【 】</button>
            <button class="btn" onclick="insertTemplate()">导入参数模板</button>
            <div style="flex-grow: 1;"></div>
            <button class="btn btn-orange" onclick="cleanCode()">一键合规化</button>
        </div>
        <textarea id="input" placeholder="请在这里开始排版您的 Amazon Listing..."></textarea>
    </div>

    <div id="right">
        <div class="preview-header">Amazon Frontend Preview (详情页实际显示效果)</div>
        <div id="output"></div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        // 实时预览
        input.addEventListener('input', () => {
            output.innerHTML = input.value;
        });

        // 在光标处包裹标签 (用于加粗、括号等)
        function wrapText(open, close) {
            const start = input.selectionStart;
            const end = input.selectionEnd;
            const text = input.value;
            const selected = text.substring(start, end);
            const before = text.substring(0, start);
            const after = text.substring(end);
            
            input.value = before + open + selected + close + after;
            input.focus();
            input.setSelectionRange(start + open.length, end + open.length);
            updatePreview();
        }

        // 在光标处插入文本 (用于换行)
        function insertText(text) {
            const start = input.selectionStart;
            const before = input.value.substring(0, start);
            const after = input.value.substring(start);
            input.value = before + text + after;
            input.focus();
            input.setSelectionRange(start + text.length, start + text.length);
            updatePreview();
        }

        // 插入列表模块
        function insertList() {
            const listTemplate = "<ul>\n  <li>核心卖点 1</li>\n  <li>核心卖点 2</li>\n  <li>核心卖点 3</li>\n</ul>\n";
            insertText(listTemplate);
        }

        // 插入你要求的固定参数模板
        function insertTemplate() {
            const specs = `<strong>【Specifications】</strong><br>
<ul>
  <li>Material: </li>
  <li>Power: </li>
  <li>Dimensions: </li>
</ul>

<strong>【What's in the Box?】</strong><br>
<ul>
  <li>1 x Pixelink-US Device</li>
  <li>1 x User Manual</li>
</ul>`;
            insertText(specs);
        }

        function updatePreview() {
            output.innerHTML = input.value;
        }

        // 一键规范化 (去除非法标签)
        function cleanCode() {
            let code = input.value;
            // 过滤掉所有非亚马逊允许的标签，只保留 b, strong, i, p, br, ul, li
            input.value = code.replace(/<\/?(?!p|b|strong|br|ul|li|i|em)\w+[^>]*>/gi, '');
            updatePreview();
            alert('已完成 A10 算法合规化处理！');
        }
    </script>
</body>
</html>
