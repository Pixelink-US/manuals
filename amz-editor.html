<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Pixelink-US 亚马逊专用排版工具</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; height: 100vh; background: #f3f3f3; }
        #left { width: 50%; display: flex; flex-direction: column; border-right: 2px solid #ddd; }
        #right { width: 50%; background: white; padding: 40px; overflow-y: auto; }
        textarea { flex-grow: 1; padding: 20px; font-family: monospace; font-size: 14px; border: none; outline: none; background: #2d2d2d; color: #ccc; line-height: 1.5; }
        .toolbar { background: #232f3e; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #febd69; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 3px; }
        button:hover { background: #f3a847; }
        .preview-label { font-size: 12px; color: #888; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div id="left">
        <div class="toolbar">
            <span>亚马逊 HTML 编辑器</span>
            <button onclick="cleanCode()">一键规范化 (去除非法标签)</button>
        </div>
        <textarea id="input" placeholder="在此输入 HTML 代码..."></textarea>
    </div>
    <div id="right">
        <div class="preview-label">亚马逊页面实际显示效果预览：</div>
        <div id="output"></div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        // 实时预览逻辑
        input.addEventListener('input', () => {
            output.innerHTML = input.value;
        });

        // 核心：亚马逊排版清理逻辑
        function cleanCode() {
            let code = input.value;
            // 1. 只保留 p, b, strong, br, ul, li
            const temp = document.createElement('div');
            temp.innerHTML = code;
            const allElements = temp.getElementsByTagName('*');
            
            // 允许的标签名单
            const allowed = ['P', 'B', 'STRONG', 'BR', 'UL', 'LI', 'I', 'EM'];
            
            // 简单演示：这里可以扩展更复杂的清理逻辑
            input.value = temp.innerHTML.replace(/<\/?(?!p|b|strong|br|ul|li|i|em)\w+[^>]*>/gi, '');
            output.innerHTML = input.value;
            alert('已清理亚马逊不支持的标签（如 div, span, style 等）');
        }
    </script>
</body>
</html>
